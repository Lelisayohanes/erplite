name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      ERPLITE_APP_NAME: ${{ secrets.ERPLITE_APP_NAME }}
      ERPLITE_APP_ENV: ${{ secrets.ERPLITE_APP_ENV }}
      ERPLITE_APP_PORT: ${{ secrets.ERPLITE_APP_PORT }}
      ERPLITE_APP_DEBUG: ${{ secrets.ERPLITE_APP_DEBUG }}
      ERPLITE_APP_TIMEOUT: ${{ secrets.ERPLITE_APP_TIMEOUT }}
      ERPLITE_APP_LOGFORMAT: ${{ secrets.ERPLITE_APP_LOGFORMAT }}
      ERPLITE_DATABASE_HOST: ${{ secrets.ERPLITE_DATABASE_HOST }}
      ERPLITE_DATABASE_PORT: ${{ secrets.ERPLITE_DATABASE_PORT }}
      ERPLITE_DATABASE_USER: ${{ secrets.ERPLITE_DATABASE_USER }}
      ERPLITE_DATABASE_PASSWORD: ${{ secrets.ERPLITE_DATABASE_PASSWORD }}
      ERPLITE_DATABASE_DBNAME: ${{ secrets.ERPLITE_DATABASE_DBNAME }}
      ERPLITE_DATABASE_SSLMODE: ${{ secrets.ERPLITE_DATABASE_SSLMODE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  docker:
    name: Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t erplite:${{ github.sha }} .
