services:
  app:
    build:
      context: .
      target: builder   # use builder stage for dev (contains `air`)
    ports:
      - "8080:8080"
    environment:
      - ERPLITE_APP_PORT=8080
      - ERPLITE_DATABASE_HOST=db          # service name resolves inside Docker
      - ERPLITE_DATABASE_PORT=5432        # internal container port
      - ERPLITE_DATABASE_USER=postgres
      - ERPLITE_DATABASE_PASSWORD=postgres
      - ERPLITE_DATABASE_DBNAME=erplite
      - ERPLITE_APP_DEBUG=true
    volumes:
      - .:/app                    # mount code for live reload
      - /app/tmp                  # keep tmp inside container
    depends_on:
      db:
        condition: service_healthy
    command: air

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erplite
    ports:
      - "5433:5432"               # host:container – host uses 5433 to avoid conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: